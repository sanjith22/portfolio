<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search AI — Case Study · Sanjith C</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #F7F3EE;
    --bg2:     #EFE9E1;
    --bg3:     #E6DDD3;
    --text:    #1C1915;
    --text-dim:#7A706A;
    --accent:  #9B5E2A;
    --accent2: #C07A3E;
    --border2: rgba(28,25,21,0.09);
    --nav-h:   65px;
    --font-display: 'Cormorant Garamond', serif;
    --font-body:    'DM Sans', sans-serif;
    --font-mono:    'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; scroll-behavior: smooth; }
  body { background: var(--bg2); color: var(--text); font-family: var(--font-body); font-weight: 300; cursor: none; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* CURSOR */
  .cursor      { position: fixed; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
  .cursor-ring { position: fixed; width: 34px; height: 34px; border: 1px solid rgba(155,94,42,0.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.2s, height 0.2s; }

  /* PROGRESS */
  .progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 3000; width: 0%; transition: width 0.1s linear; }

  /* ── NAV ───────────────────────────────── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    height: var(--nav-h);
    background: rgba(247,243,238,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    gap: 20px;
  }

  .nav-left  { display: flex; align-items: center; gap: 24px; min-width: 0; }
  .nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

  .nav-logo  { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text); text-decoration: none; flex-shrink: 0; }
  .nav-logo span { color: var(--accent); }

  .nav-sep   { width: 1px; height: 18px; background: var(--border2); flex-shrink: 0; }

  .nav-back  { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 7px; transition: color 0.2s; flex-shrink: 0; }
  .nav-back::before { content: '←'; font-size: 13px; }
  .nav-back:hover { color: var(--accent); }

  .nav-title { min-width: 0; overflow: hidden; }
  .nav-title-label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
  .nav-title-name  { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }

  .nav-meta { display: flex; gap: 20px; }
  .nav-meta-item { display: flex; flex-direction: column; align-items: flex-end; }
  .nav-meta-l { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .nav-meta-v { font-size: 12px; font-weight: 400; color: var(--text); }

  .btn-dl {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent); padding: 7px 16px;
    text-decoration: none; transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-dl:hover { background: var(--accent); color: var(--bg); }

  /* ── PAGE BODY ─────────────────────────── */
  .page-body {
    padding-top: var(--nav-h);
    min-height: 100vh;
  }

  /* ── IMAGE CONTAINER ────────────────────── */
  .cs-image-wrap {
    /* max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px; */
  }

  .cs-image-wrap img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
    box-shadow: 0 4px 40px rgba(28,25,21,0.1), 0 1px 4px rgba(28,25,21,0.06);
  }

  /* ── FOOTER ─────────────────────────────── */
  .page-footer {
    padding: 24px 48px;
    border-top: 1px solid var(--border2);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .footer-copy { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .footer-links { display: flex; gap: 16px; align-items: center; }
  .footer-link  { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
  .footer-link:hover { color: var(--accent); }

  /* MOBILE */
  @media (max-width: 768px) {
    .nav { padding: 0 20px; gap: 12px; }
    .nav-title, .nav-meta, .nav-sep:last-of-type { display: none; }
    .cs-image-wrap { padding: 32px 16px 60px; }
    .page-footer { flex-direction: column; text-align: center; padding: 20px; gap: 12px; }
    .nav-sep { display: none; }
    .nav-back + .nav-sep { display: none; }
  }
  @media (max-width: 1024px) and (min-width: 769px) {
    .nav-meta { display: none; }
  }
</style>
</head>
<body>

<div class="progress" id="prog"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <a href="index.html" class="nav-logo">S<span>.</span>C</a>
    <div class="nav-sep"></div>
    <a href="index.html#works" class="nav-back">All Works</a>
    <div class="nav-sep"></div>
    <div class="nav-title">
      <div class="nav-title-label">Case Study</div>
      <div class="nav-title-name">Search AI — Google Ads Skin</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-meta">
      <div class="nav-meta-item">
        <span class="nav-meta-l">Client</span>
        <span class="nav-meta-v">MinoriLabs</span>
      </div>
      <div class="nav-meta-item">
        <span class="nav-meta-l">Timeline</span>
        <span class="nav-meta-v">4 Months</span>
      </div>
      <div class="nav-meta-item">
        <span class="nav-meta-l">Role</span>
        <span class="nav-meta-v">Sr. UI/UX Designer</span>
      </div>
    </div>
    <a href="./images/Search Ai.jpg" download="SearchAI_CaseStudy_SanjithC.webp" class="btn-dl">↓ Download</a>
  </div>
</nav>

<!-- CONTENT -->
<main class="page-body">
  <div class="cs-image-wrap">
    <img
      src="./images/Search Ai.jpg"
      alt="Search AI Case Study — Sanjith C, Sr. UI/UX Designer, MinoriLabs"
      loading="eager"
      class="img-responsive"
    />
  </div>
</main>

<!-- FOOTER -->
<footer class="page-footer">
  <span class="footer-copy">&#169; 2025 Sanjith C &middot; Senior UI/UX Designer &middot; Coimbatore</span>
  <div class="footer-links">
    <a href="index.html#works" class="footer-link">← All Works</a>
    <a href="index.html#contact" class="footer-link">Contact</a>
    <a href="#" class="footer-link" id="ftTop">↑ Top</a>
  </div>
</footer>

<script>
(function () {
  /* Cursor */
  var cur  = document.getElementById('cursor');
  var ring = document.getElementById('cursorRing');
  var mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  });
  (function tick() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll('a, button').forEach(function (el) {
    el.addEventListener('mouseenter', function () { ring.style.width = '50px'; ring.style.height = '50px'; });
    el.addEventListener('mouseleave', function () { ring.style.width = '34px'; ring.style.height = '34px'; });
  });

  /* Progress bar */
  var prog = document.getElementById('prog');
  window.addEventListener('scroll', function () {
    var t = document.documentElement.scrollHeight - window.innerHeight;
    prog.style.width = (t > 0 ? (window.scrollY / t) * 100 : 0) + '%';
  });

  /* Back to top */
  document.getElementById('ftTop').addEventListener('click', function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
</body>
</html>
